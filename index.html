<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Mighty Scorpion AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">
    <div id="header">
      <div id="logo">🦂 THE MIGHTY SCORPION</div>
      <div id="status"><span id="dot"></span> JARVIS ONLINE</div>
    </div>

    <div id="orb-area">
      <div id="orb" onclick="orbTapped()">🦂</div>
      <div id="orb-label">SCORPION CORE</div>
      <div id="orb-status">TAP THE ORB TO ACTIVATE</div>
    </div>

    <div id="input-area">
      <input id="cmd" type="text" placeholder="or type a command..." />
      <button onclick="sendCmd()">SEND</button>
    </div>

    <div id="output">SCORPION AI READY.</div>
  </div>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#00ff88; font-family:'Share Tech Mono',monospace; min-height:100vh; }
    #header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; border-bottom:1px solid #00ff4420; }
    #logo { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; letter-spacing:3px; }
    #status { font-size:11px; color:#00ff8877; display:flex; align-items:center; gap:6px; }
    #dot { width:8px; height:8px; border-radius:50%; background:#00ff88; display:inline-block; animation:pulse 1.5s infinite; }
    #orb-area { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; }
    #orb { font-size:100px; cursor:pointer; animation:float 3s ease-in-out infinite; transition:transform 0.2s, filter 0.2s; filter:drop-shadow(0 0 20px #00ff8844); user-select:none; }
    #orb:active { transform:scale(0.9); }
    #orb.listening { animation:orbPulse 0.6s ease-in-out infinite; filter:drop-shadow(0 0 40px #00ff88cc); }
    #orb.thinking { filter:drop-shadow(0 0 40px #ffaa00cc); }
    #orb.speaking { animation:orbPulse 0.4s ease-in-out infinite; filter:drop-shadow(0 0 40px #00aaffcc); }
    #orb.active { filter:drop-shadow(0 0 30px #00ff8899); }
    #orb-label { font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:4px; color:#00ff8866; margin-top:16px; }
    #orb-status { font-size:13px; color:#00ff88aa; margin-top:10px; letter-spacing:2px; text-align:center; }
    #input-area { display:flex; gap:8px; padding:0 24px; max-width:700px; margin:0 auto; }
    #cmd { flex:1; background:#00ff880a; border:1px solid #00ff4430; border-radius:6px; padding:12px 16px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:13px; outline:none; }
    #cmd::placeholder { color:#00ff8833; }
    button { background:#00ff4415; border:1px solid #00ff4430; border-radius:6px; padding:12px 20px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:12px; cursor:pointer; }
    button:hover { background:#00ff4430; }
    #output { max-width:700px; margin:24px auto; padding:16px 24px; font-size:13px; color:#00ff8888; line-height:1.9; white-space:pre-wrap; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes orbPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  </style>

  <script>
    // ─── STATE ───────────────────────────────────────────
    let state = 'idle';       // idle | listening | thinking | speaking
    let alwaysOn = false;     // always-on mode toggled
    let recognition = null;
    let audioUnlocked = false;
    let resumeTimer = null;
    let interimBuffer = '';   // live interim transcript while Scorpion speaks

    // ─── ORB UI ──────────────────────────────────────────
    function setOrbState(newState, statusText) {
      state = newState;
      document.getElementById('orb').className = newState;
      document.getElementById('orb-status').innerText = statusText;
    }

    // ─── AUDIO UNLOCK ────────────────────────────────────
    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        new Audio("data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCA").play().catch(()=>{});
        audioUnlocked = true;
      } catch(e) {}
    }

    // ─── SOUNDS ──────────────────────────────────────────
    function playTone(freqStart, freqEnd, duration, volume=0.25) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(freqStart, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + duration);
        gain.gain.setValueAtTime(volume, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration + 0.05);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration + 0.1);
      } catch(e) {}
    }

    function playActivationSound() {
      playTone(200, 600, 0.3);
      setTimeout(() => playTone(880, 880, 0.2, 0.2), 350);
    }

    function playInterruptSound() {
      playTone(600, 200, 0.2, 0.15);
    }

    function playStopSound() {
      playTone(500, 150, 0.25);
    }

    // ─── STOP SPEAKING ───────────────────────────────────
    function stopSpeaking() {
      if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
      window.speechSynthesis.cancel();
    }

    // ─── ORB TAP ─────────────────────────────────────────
    function orbTapped() {
      unlockAudio();

      // if idle — turn on always-on mode
      if (!alwaysOn) {
        alwaysOn = true;
        playActivationSound();
        startContinuousListening();
        return;
      }

      // if already on — turn off everything
      alwaysOn = false;
      stopSpeaking();
      stopRecognition();
      playStopSound();
      setOrbState('idle', 'TAP THE ORB TO ACTIVATE');
    }

    // ─── CONTINUOUS VOICE RECOGNITION ────────────────────
    function initVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        setOrbState('idle', 'VOICE NOT SUPPORTED - USE CHROME');
        return false;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = true;      // keeps mic open always
      recognition.interimResults = true;  // gets words as you speak
      recognition.lang = 'en-US';

      recognition.onresult = function(event) {
        let interim = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interim += event.results[i][0].transcript;
          }
        }

        interimBuffer = interim;

        // INTERRUPT — if Scorpion is speaking and you say anything
        if (state === 'speaking' && (interim.length > 2 || finalTranscript.length > 2)) {
          stopSpeaking();
          playInterruptSound();
          // wait for your final words before processing
        }

        // FINAL TRANSCRIPT — process your command
        if (finalTranscript.trim()) {
          const cmd = finalTranscript.trim();
          document.getElementById('cmd').value = cmd;
          document.getElementById('output').innerText = '🎙️ ' + cmd;

          // detect SING command
          if (isSingCommand(cmd)) {
            handleSing(cmd);
            return;
          }

          setOrbState('thinking', 'HEARD: ' + cmd.toUpperCase().slice(0, 40));
          sendCmd();
        }
      };

      recognition.onerror = function(event) {
        if (event.error === 'aborted' || event.error === 'no-speech') return;
        if (event.error === 'not-allowed') {
          alwaysOn = false;
          setOrbState('idle', 'MIC BLOCKED — CHECK SITE PERMISSIONS');
        }
      };

      recognition.onend = function() {
        // auto-restart if always-on mode is still active
        if (alwaysOn && state !== 'thinking') {
          setTimeout(() => {
            if (alwaysOn) startContinuousListening();
          }, 200);
        }
      };

      return true;
    }

    function startContinuousListening() {
      if (!recognition) {
        if (!initVoice()) return;
      }
      if (state !== 'thinking') {
        setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
      }
      try { recognition.start(); } catch(e) {}
    }

    function stopRecognition() {
      if (recognition) {
        try { recognition.abort(); } catch(e) {}
      }
    }

    // ─── SING DETECTION ──────────────────────────────────
    function isSingCommand(text) {
      const t = text.toLowerCase();
      return t.includes('sing') || t.includes('song') || t.includes('hum');
    }

    // ─── SING MODE — makes voice melodic ─────────────────
    function handleSing(cmd) {
      setOrbState('speaking', '🎵 SCORPION SINGING...');

      // ask AI for song lyrics first
      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: cmd + ' — respond with short song lyrics only, 4 lines max, simple rhyming words, no markdown'
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.reply) {
          singText(data.reply);
          document.getElementById('output').innerText = '🎵 ' + data.reply;
        }
      })
      .catch(() => {
        singText("I am Scorpion, sharp and bright, here to help you day and night.");
      });
    }

    function singText(lyrics) {
      stopSpeaking();
      setOrbState('speaking', '🎵 SCORPION SINGING...');

      const lines = lyrics.split(/[\n.!?]+/).filter(l => l.trim());
      let i = 0;

      function singLine() {
        if (i >= lines.length || !alwaysOn) {
          if (alwaysOn) setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
          return;
        }

        const utterance = new SpeechSynthesisUtterance(lines[i].trim());
        utterance.lang = 'en-US';
        utterance.volume = 1.0;

        // alternate pitch to create melody effect
        const pitches = [1.3, 1.1, 1.4, 1.0, 1.5, 1.2];
        const rates   = [0.85, 0.9, 0.8, 0.95, 0.75, 0.88];
        utterance.pitch = pitches[i % pitches.length];
        utterance.rate  = rates[i % rates.length];

        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v =>
          v.name.includes('Google US English') || v.name.includes('Daniel') || v.name.includes('Alex')
        );
        if (preferred) utterance.voice = preferred;

        utterance.onend = () => {
          i++;
          setTimeout(singLine, 300); // small pause between lines
        };

        window.speechSynthesis.speak(utterance);
      }

      singLine();
    }

    // ─── NORMAL VOICE OUTPUT ─────────────────────────────
    function speakReply(text) {
      try {
        stopSpeaking();

        const cleanText = text
          .replace(/\*\*/g,'').replace(/\*/g,'')
          .replace(/#{1,6}/g,'').replace(/`/g,'')
          .replace(/\[([^\]]+)\]\([^\)]+\)/g,'$1')
          .replace(/\n+/g,' ')
          .trim();

        setOrbState('speaking', 'SCORPION SPEAKING... JUST TALK TO INTERRUPT');

        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'en-US';
        utterance.pitch = 0.85;
        utterance.rate = 1.15;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v =>
          v.name.includes('Google US English') ||
          v.name.includes('Daniel') ||
          v.name.includes('Alex')
        );
        if (preferred) utterance.voice = preferred;

        utterance.onend = () => {
          if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
          if (state === 'speaking' && alwaysOn) {
            setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
          } else if (state === 'speaking') {
            setOrbState('idle', 'TAP THE ORB TO SPEAK');
          }
        };

        utterance.onerror = () => {
          if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
          if (alwaysOn) setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
          else setOrbState('idle', 'TAP THE ORB TO SPEAK');
        };

        // fix Chrome freeze bug on long speech
        resumeTimer = setInterval(() => {
          if (!window.speechSynthesis.speaking) {
            clearInterval(resumeTimer); resumeTimer = null;
          } else {
            window.speechSynthesis.resume();
          }
        }, 8000);

        window.speechSynthesis.speak(utterance);

      } catch(e) {
        setOrbState('idle', 'TAP THE ORB TO SPEAK');
      }
    }

    // ─── AI BRAIN ────────────────────────────────────────
    async function sendCmd() {
      unlockAudio();
      const val = document.getElementById('cmd').value.trim();
      if (!val) return;
      document.getElementById('cmd').value = '';

      if (state !== 'thinking') setOrbState('thinking', 'THINKING...');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: val })
        });

        const data = await response.json();

        if (data.error) {
          document.getElementById('output').innerText = '❌ ' + data.error;
          if (alwaysOn) setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
          else setOrbState('idle', 'ERROR — TAP ORB TO RETRY');
          return;
        }

        document.getElementById('output').innerText = '🦂 ' + data.reply;
        speakReply(data.reply);

      } catch(e) {
        document.getElementById('output').innerText = '❌ ERROR: ' + e.message;
        if (alwaysOn) setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
        else setOrbState('idle', 'ERROR — TAP ORB TO RETRY');
      }
    }

    document.getElementById('cmd').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendCmd();
    });
  </script>

</body>
</html>
