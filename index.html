<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Mighty Scorpion AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">
    <div id="header">
      <div id="logo">🦂 THE MIGHTY SCORPION</div>
      <div id="status"><span id="dot"></span> JARVIS ONLINE</div>
    </div>

    <div id="orb-area">
      <div id="orb" onclick="activateScorpion()">🦂</div>
      <div id="orb-label">SCORPION CORE</div>
      <div id="orb-status">TAP THE ORB TO SPEAK</div>
    </div>

    <div id="input-area">
      <input id="cmd" type="text" placeholder="or type a command..." />
      <button onclick="sendCmd()">SEND</button>
    </div>

    <div id="output">SCORPION AI READY.</div>
  </div>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#00ff88; font-family:'Share Tech Mono',monospace; min-height:100vh; }
    #header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; border-bottom:1px solid #00ff4420; }
    #logo { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; letter-spacing:3px; }
    #status { font-size:11px; color:#00ff8877; display:flex; align-items:center; gap:6px; }
    #dot { width:8px; height:8px; border-radius:50%; background:#00ff88; display:inline-block; animation:pulse 1.5s infinite; }
    #orb-area { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; }
    #orb { font-size:100px; cursor:pointer; animation:float 3s ease-in-out infinite; transition:transform 0.2s, filter 0.2s; filter:drop-shadow(0 0 20px #00ff8844); user-select:none; }
    #orb:active { transform:scale(0.9); }
    #orb.listening { animation:orbPulse 0.6s ease-in-out infinite; filter:drop-shadow(0 0 40px #00ff88cc); }
    #orb.thinking { filter:drop-shadow(0 0 40px #ffaa00cc); }
    #orb.speaking { animation:orbPulse 0.4s ease-in-out infinite; filter:drop-shadow(0 0 40px #00aaffcc); }
    #orb-label { font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:4px; color:#00ff8866; margin-top:16px; }
    #orb-status { font-size:13px; color:#00ff88aa; margin-top:10px; letter-spacing:2px; }
    #input-area { display:flex; gap:8px; padding:0 24px; max-width:700px; margin:0 auto; }
    #cmd { flex:1; background:#00ff880a; border:1px solid #00ff4430; border-radius:6px; padding:12px 16px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:13px; outline:none; }
    #cmd::placeholder { color:#00ff8833; }
    button { background:#00ff4415; border:1px solid #00ff4430; border-radius:6px; padding:12px 20px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:12px; cursor:pointer; }
    button:hover { background:#00ff4430; }
    #output { max-width:700px; margin:24px auto; padding:16px 24px; font-size:13px; color:#00ff8888; line-height:1.9; white-space:pre-wrap; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes orbPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  </style>

  <script src="https://js.puter.com/v2/"></script>

  <script>
    // ─── ORB STATE ───────────────────────────────────────
    function setOrbState(state, statusText) {
      document.getElementById('orb').className = state;
      document.getElementById('orb-status').innerText = statusText;
    }

    // ─── ACTIVATION SOUND ────────────────────────────────
    function playActivationSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.frequency.setValueAtTime(200, ctx.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.3);
        gain1.gain.setValueAtTime(0.3, ctx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc1.start(ctx.currentTime);
        osc1.stop(ctx.currentTime + 0.4);
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(880, ctx.currentTime + 0.35);
        gain2.gain.setValueAtTime(0.2, ctx.currentTime + 0.35);
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
        osc2.start(ctx.currentTime + 0.35);
        osc2.stop(ctx.currentTime + 0.7);
      } catch(e) {}
    }

    // ─── VOICE INPUT ─────────────────────────────────────
    let recognition = null;
    let isListening = false;

    function initVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        setOrbState('', 'VOICE NOT SUPPORTED - USE CHROME');
        return false;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById('cmd').value = transcript;
        setOrbState('thinking', 'HEARD: ' + transcript.toUpperCase());
        isListening = false;
        sendCmd();
      };

      recognition.onerror = function(event) {
        setOrbState('', 'MIC ERROR: ' + event.error.toUpperCase());
        isListening = false;
      };

      recognition.onend = function() {
        if (isListening) {
          isListening = false;
          setOrbState('', 'TAP THE ORB TO SPEAK');
        }
      };

      return true;
    }

    function activateScorpion() {
      playActivationSound();
      if (!recognition) {
        if (!initVoice()) return;
      }
      if (isListening) {
        recognition.stop();
        isListening = false;
        setOrbState('', 'TAP THE ORB TO SPEAK');
        return;
      }
      isListening = true;
      setOrbState('listening', 'LISTENING... SPEAK NOW');
      recognition.start();
    }

    // ─── VOICE OUTPUT - ELEVENLABS ONLY ──────────────────
    let currentAudio = null;

    async function speakReply(text) {
      try {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }

        const cleanText = text
          .replace(/\*\*/g, '').replace(/\*/g, '')
          .replace(/#{1,6}/g, '').replace(/`/g, '')
          .replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1')
          .trim();

        setOrbState('speaking', 'SCORPION SPEAKING...');

        const audio = await puter.ai.txt2speech(cleanText, {
          provider: 'elevenlabs',
          voice: '21m00Tcm4TlvDq8ikWAM',
          model: 'eleven_multilingual_v2'
        });

        currentAudio = audio;
        audio.onended = () => setOrbState('', 'TAP THE ORB TO SPEAK');
        audio.onerror = () => setOrbState('', 'VOICE ERROR - TAP ORB TO RETRY');
        audio.play();

      } catch(e) {
        console.error('Voice error:', e);
        setOrbState('', 'VOICE UNAVAILABLE - CHECK PUTER LOGIN');
      }
    }

    // ─── AI BRAIN ────────────────────────────────────────
    async function sendCmd() {
      const val = document.getElementById('cmd').value.trim();
      if (!val) return;
      document.getElementById('cmd').value = '';
      setOrbState('thinking', 'THINKING...');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: val })
        });

        const data = await response.json();

        if (data.error) {
          setOrbState('', 'ERROR - TAP ORB TO RETRY');
          document.getElementById('output').innerText = '❌ ' + data.error;
          return;
        }

        document.getElementById('output').innerText = '🦂 ' + data.reply;
        speakReply(data.reply);

      } catch(e) {
        setOrbState('', 'ERROR - TAP ORB TO RETRY');
        document.getElementById('output').innerText = '❌ ERROR: ' + e.message;
      }
    }

    document.getElementById('cmd').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendCmd();
    });
  </script>

</body>
</html>
