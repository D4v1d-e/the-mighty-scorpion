<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Mighty Scorpion AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">
    <div id="header">
      <div id="logo">🦂 THE MIGHTY SCORPION</div>
      <div id="status"><span id="dot"></span> JARVIS ONLINE</div>
    </div>

    <div id="orb-area">
      <div id="orb" onclick="orbTapped()">🦂</div>
      <div id="orb-label">SCORPION CORE</div>
      <div id="orb-status">TAP TO ACTIVATE ALWAYS-ON MODE</div>
    </div>

    <div id="input-area">
      <input id="cmd" type="text" placeholder="or type a command..." />
      <button onclick="sendCmd()">SEND</button>
    </div>

    <div id="output">SCORPION AI READY.</div>
  </div>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#00ff88; font-family:'Share Tech Mono',monospace; min-height:100vh; }
    #header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; border-bottom:1px solid #00ff4420; }
    #logo { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; letter-spacing:3px; }
    #status { font-size:11px; color:#00ff8877; display:flex; align-items:center; gap:6px; }
    #dot { width:8px; height:8px; border-radius:50%; background:#00ff88; display:inline-block; animation:pulse 1.5s infinite; }
    #orb-area { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; }
    #orb { font-size:100px; cursor:pointer; animation:float 3s ease-in-out infinite; transition:transform 0.2s, filter 0.2s; filter:drop-shadow(0 0 20px #00ff8844); user-select:none; }
    #orb:active { transform:scale(0.9); }
    #orb.listening { animation:orbPulse 0.6s ease-in-out infinite; filter:drop-shadow(0 0 40px #00ff88cc); }
    #orb.thinking { filter:drop-shadow(0 0 40px #ffaa00cc); }
    #orb.speaking { animation:orbPulse 0.4s ease-in-out infinite; filter:drop-shadow(0 0 40px #00aaffcc); }
    #orb-label { font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:4px; color:#00ff8866; margin-top:16px; }
    #orb-status { font-size:13px; color:#00ff88aa; margin-top:10px; letter-spacing:2px; text-align:center; padding:0 20px; }
    #input-area { display:flex; gap:8px; padding:0 24px; max-width:700px; margin:0 auto; }
    #cmd { flex:1; background:#00ff880a; border:1px solid #00ff4430; border-radius:6px; padding:12px 16px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:13px; outline:none; }
    #cmd::placeholder { color:#00ff8833; }
    button { background:#00ff4415; border:1px solid #00ff4430; border-radius:6px; padding:12px 20px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:12px; cursor:pointer; }
    button:hover { background:#00ff4430; }
    #output { max-width:700px; margin:24px auto; padding:16px 24px; font-size:13px; color:#00ff8888; line-height:1.9; white-space:pre-wrap; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes orbPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  </style>

  <script>
    // ─── STATE ───────────────────────────────────────────
    let state         = 'idle';
    let alwaysOn      = false;
    let recognition   = null;
    let audioUnlocked = false;
    let resumeTimer   = null;
    let processingCmd = false;

    // ─── ORB UI ──────────────────────────────────────────
    function setOrbState(newState, statusText) {
      state = newState;
      document.getElementById('orb').className = newState;
      document.getElementById('orb-status').innerText = statusText;
    }

    // ─── AUDIO UNLOCK ────────────────────────────────────
    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        new Audio("data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCA").play().catch(()=>{});
        audioUnlocked = true;
      } catch(e) {}
    }

    // ─── SOUNDS ──────────────────────────────────────────
    function playTone(freqStart, freqEnd, duration, volume, delay) {
      setTimeout(() => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(freqStart, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + duration);
          gain.gain.setValueAtTime(volume || 0.25, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration + 0.05);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + duration + 0.1);
        } catch(e) {}
      }, delay || 0);
    }

    function playActivationSound() {
      playTone(200, 600, 0.3, 0.3, 0);
      playTone(880, 880, 0.15, 0.2, 350);
    }

    function playInterruptSound() {
      playTone(800, 300, 0.15, 0.2, 0);
    }

    function playStopSound() {
      playTone(500, 150, 0.25, 0.25, 0);
    }

    // ─── STOP SPEAKING ───────────────────────────────────
    function stopSpeaking() {
      if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
      window.speechSynthesis.cancel();
    }

    // ─── ORB TAP ─────────────────────────────────────────
    function orbTapped() {
      unlockAudio();

      if (!alwaysOn) {
        alwaysOn = true;
        playActivationSound();
        initAndStartListening();
      } else {
        alwaysOn = false;
        stopSpeaking();
        stopRecognition();
        processingCmd = false;
        playStopSound();
        setOrbState('idle', 'TAP TO ACTIVATE ALWAYS-ON MODE');
      }
    }

    // ─── VOICE RECOGNITION ───────────────────────────────
    function initAndStartListening() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        setOrbState('idle', 'VOICE NOT SUPPORTED - USE CHROME');
        alwaysOn = false;
        return;
      }

      if (recognition) {
        try { recognition.abort(); } catch(e) {}
        recognition = null;
      }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous     = true;
      recognition.interimResults = true;
      recognition.lang           = 'en-US';

      recognition.onresult = function(event) {
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            // interim = ONLY for interrupt detection
            // NEVER touches the text input box
            const interim = event.results[i][0].transcript;
            if (state === 'speaking' && interim.length > 2) {
              stopSpeaking();
              playInterruptSound();
              setOrbState('listening', 'INTERRUPTED — LISTENING...');
            }
          }
        }

        // process final voice command
        if (finalTranscript.trim() && !processingCmd) {
          const cmd = finalTranscript.trim();

          // KEY FIX — if user is typing in the box, ignore voice completely
          const inputBox = document.getElementById('cmd');
          if (document.activeElement === inputBox) return;

          inputBox.value = cmd;

          // STOP command
          if (/^(stop|quiet|silence|shut up|enough)$/i.test(cmd)) {
            stopSpeaking();
            setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
            return;
          }

          // SING command
          if (/sing|song|hum|melody/i.test(cmd)) {
            handleSing(cmd);
            return;
          }

          setOrbState('thinking', 'HEARD: ' + cmd.toUpperCase().slice(0, 45));
          sendCmdText(cmd);
        }
      };

      recognition.onerror = function(event) {
        if (event.error === 'aborted' || event.error === 'no-speech') return;
        if (event.error === 'not-allowed') {
          alwaysOn = false;
          setOrbState('idle', 'MIC BLOCKED — CHECK SITE PERMISSIONS');
        }
      };

      recognition.onend = function() {
        // keep mic alive as long as always-on is active
        if (alwaysOn) {
          setTimeout(() => {
            if (alwaysOn && recognition) {
              try { recognition.start(); } catch(e) {}
            }
          }, 150);
        }
      };

      setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
      try { recognition.start(); } catch(e) {}
    }

    function stopRecognition() {
      if (recognition) {
        try { recognition.abort(); } catch(e) {}
        recognition = null;
      }
    }

    // ─── SING MODE ───────────────────────────────────────
    function handleSing(cmd) {
      processingCmd = true;
      setOrbState('thinking', 'COMPOSING A SONG...');

      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: cmd + ' — write exactly 4 short rhyming song lines, plain text only, no numbers, no markdown, no emojis'
        })
      })
      .then(r => r.json())
      .then(data => {
        processingCmd = false;
        const lyrics = data.reply || 'I am Scorpion sharp and bright, here to help you day and night, ask me anything you need, I respond at lightning speed.';
        document.getElementById('output').innerText = '🎵 ' + lyrics;
        singLines(lyrics);
      })
      .catch(() => {
        processingCmd = false;
        singLines('I am Scorpion sharp and bright, here to help you day and night.');
      });
    }

    function singLines(lyrics) {
      stopSpeaking();
      setOrbState('speaking', '🎵 SCORPION SINGING...');

      const lines = lyrics
        .split(/\n+/)
        .map(l => l.replace(/^[\d\.\-\*]+\s*/, '').trim())
        .filter(l => l.length > 2);

      const pitches = [1.3, 1.1, 1.5, 1.0, 1.4, 1.2];
      const rates   = [0.82, 0.88, 0.78, 0.92, 0.75, 0.85];
      let i = 0;

      function singNext() {
        if (i >= lines.length || !alwaysOn) {
          if (alwaysOn) setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
          else setOrbState('idle', 'TAP TO ACTIVATE ALWAYS-ON MODE');
          return;
        }

        const utt = new SpeechSynthesisUtterance(lines[i]);
        utt.lang   = 'en-US';
        utt.volume = 1.0;
        utt.pitch  = pitches[i % pitches.length];
        utt.rate   = rates[i % rates.length];

        const voices = window.speechSynthesis.getVoices();
        const v = voices.find(v =>
          v.name.includes('Google US English') ||
          v.name.includes('Daniel') ||
          v.name.includes('Alex')
        );
        if (v) utt.voice = v;

        utt.onend  = () => { i++; setTimeout(singNext, 350); };
        utt.onerror = () => { i++; setTimeout(singNext, 350); };

        window.speechSynthesis.speak(utt);
      }

      singNext();
    }

    // ─── NORMAL VOICE OUTPUT ─────────────────────────────
    function speakReply(text) {
      stopSpeaking();

      const clean = text
        .replace(/\*\*/g,'').replace(/\*/g,'')
        .replace(/#{1,6}\s/g,'').replace(/`/g,'')
        .replace(/\[([^\]]+)\]\([^\)]+\)/g,'$1')
        .replace(/\n+/g,' ')
        .trim();

      setOrbState('speaking', 'SPEAKING... JUST TALK TO INTERRUPT');

      const utt = new SpeechSynthesisUtterance(clean);
      utt.lang   = 'en-US';
      utt.pitch  = 0.85;
      utt.rate   = 1.15;
      utt.volume = 1.0;

      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        v.name.includes('Google US English') ||
        v.name.includes('Daniel') ||
        v.name.includes('Alex')
      );
      if (preferred) utt.voice = preferred;

      function afterSpeak() {
        if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
        if (state === 'speaking') {
          if (alwaysOn) setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
          else setOrbState('idle', 'TAP TO ACTIVATE ALWAYS-ON MODE');
        }
      }

      utt.onend   = afterSpeak;
      utt.onerror = afterSpeak;

      // fix Chrome freeze on long speech
      resumeTimer = setInterval(() => {
        if (!window.speechSynthesis.speaking) {
          clearInterval(resumeTimer); resumeTimer = null;
        } else {
          window.speechSynthesis.resume();
        }
      }, 8000);

      window.speechSynthesis.speak(utt);
    }

    // ─── AI BRAIN ────────────────────────────────────────
    async function sendCmdText(val) {
      processingCmd = true;
      document.getElementById('cmd').value = '';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: val })
        });

        const data = await response.json();
        processingCmd = false;

        if (data.error) {
          document.getElementById('output').innerText = '❌ ' + data.error;
          if (alwaysOn) setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
          else setOrbState('idle', 'ERROR — TAP ORB TO RETRY');
          return;
        }

        document.getElementById('output').innerText = '🦂 ' + data.reply;
        speakReply(data.reply);

      } catch(e) {
        processingCmd = false;
        document.getElementById('output').innerText = '❌ ERROR: ' + e.message;
        if (alwaysOn) setOrbState('listening', 'ALWAYS ON — SPEAK ANYTIME');
        else setOrbState('idle', 'ERROR — TAP ORB TO RETRY');
      }
    }

    async function sendCmd() {
      unlockAudio();
      const val = document.getElementById('cmd').value.trim();
      if (!val) return;
      document.getElementById('cmd').value = '';

      if (/sing|song|hum|melody/i.test(val)) {
        handleSing(val);
        return;
      }

      setOrbState('thinking', 'THINKING...');
      sendCmdText(val);
    }

    document.getElementById('cmd').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendCmd();
    });
  </script>

</body>
</html>
