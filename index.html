<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Mighty Scorpion AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">
    <div id="header">
      <div id="logo">🦂 THE MIGHTY SCORPION</div>
      <div id="status"><span id="dot"></span> JARVIS ONLINE</div>
    </div>

    <div id="orb-area">
      <div id="orb" onclick="orbTapped()">🦂</div>
      <div id="orb-label">SCORPION CORE</div>
      <div id="orb-status">TAP THE ORB TO SPEAK</div>
    </div>

    <div id="input-area">
      <input id="cmd" type="text" placeholder="or type a command..." />
      <button onclick="sendCmd()">SEND</button>
    </div>

    <div id="output">SCORPION AI READY.</div>
  </div>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#00ff88; font-family:'Share Tech Mono',monospace; min-height:100vh; }
    #header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; border-bottom:1px solid #00ff4420; }
    #logo { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; letter-spacing:3px; }
    #status { font-size:11px; color:#00ff8877; display:flex; align-items:center; gap:6px; }
    #dot { width:8px; height:8px; border-radius:50%; background:#00ff88; display:inline-block; animation:pulse 1.5s infinite; }
    #orb-area { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; }
    #orb { font-size:100px; cursor:pointer; animation:float 3s ease-in-out infinite; transition:transform 0.2s, filter 0.2s; filter:drop-shadow(0 0 20px #00ff8844); user-select:none; }
    #orb:active { transform:scale(0.9); }
    #orb.listening { animation:orbPulse 0.6s ease-in-out infinite; filter:drop-shadow(0 0 40px #00ff88cc); }
    #orb.thinking { filter:drop-shadow(0 0 40px #ffaa00cc); }
    #orb.speaking { animation:orbPulse 0.4s ease-in-out infinite; filter:drop-shadow(0 0 40px #00aaffcc); }
    #orb-label { font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:4px; color:#00ff8866; margin-top:16px; }
    #orb-status { font-size:13px; color:#00ff88aa; margin-top:10px; letter-spacing:2px; text-align:center; }
    #input-area { display:flex; gap:8px; padding:0 24px; max-width:700px; margin:0 auto; }
    #cmd { flex:1; background:#00ff880a; border:1px solid #00ff4430; border-radius:6px; padding:12px 16px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:13px; outline:none; }
    #cmd::placeholder { color:#00ff8833; }
    button { background:#00ff4415; border:1px solid #00ff4430; border-radius:6px; padding:12px 20px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:12px; cursor:pointer; }
    button:hover { background:#00ff4430; }
    #output { max-width:700px; margin:24px auto; padding:16px 24px; font-size:13px; color:#00ff8888; line-height:1.9; white-space:pre-wrap; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes orbPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  </style>

  <script>
    let state = 'idle';
    let recognition = null;
    let audioUnlocked = false;
    let resumeTimer = null;

    function setOrbState(newState, statusText) {
      state = newState;
      document.getElementById('orb').className = newState;
      document.getElementById('orb-status').innerText = statusText;
    }

    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        const s = new Audio("data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCA");
        s.play().catch(()=>{});
        audioUnlocked = true;
      } catch(e) {}
    }

    function playActivationSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.connect(gain1); gain1.connect(ctx.destination);
        osc1.frequency.setValueAtTime(200, ctx.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.3);
        gain1.gain.setValueAtTime(0.3, ctx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc1.start(ctx.currentTime); osc1.stop(ctx.currentTime + 0.4);
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2); gain2.connect(ctx.destination);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(880, ctx.currentTime + 0.35);
        gain2.gain.setValueAtTime(0.2, ctx.currentTime + 0.35);
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
        osc2.start(ctx.currentTime + 0.35); osc2.stop(ctx.currentTime + 0.7);
      } catch(e) {}
    }

    function playStopSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(500, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.25);
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
      } catch(e) {}
    }

    function stopSpeaking() {
      if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
      window.speechSynthesis.cancel();
    }

    function orbTapped() {
      unlockAudio();

      if (state === 'speaking' || state === 'thinking') {
        stopSpeaking();
        if (recognition) try { recognition.abort(); } catch(e) {}
        playActivationSound();
        setTimeout(() => startListening(), 300);
        return;
      }

      if (state === 'listening') {
        if (recognition) try { recognition.abort(); } catch(e) {}
        playStopSound();
        setOrbState('idle', 'TAP THE ORB TO SPEAK');
        return;
      }

      playActivationSound();
      startListening();
    }

    function initVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        setOrbState('idle', 'VOICE NOT SUPPORTED - USE CHROME');
        return false;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = function(event) {
        const result = event.results[event.results.length - 1];
        if (!result.isFinal) return;
        const transcript = result[0].transcript.trim();
        if (!transcript) return;
        document.getElementById('cmd').value = transcript;
        setOrbState('thinking', 'HEARD: ' + transcript.toUpperCase());
        sendCmd();
      };

      recognition.onerror = function(event) {
        if (event.error === 'aborted') return;
        if (event.error === 'no-speech') {
          setOrbState('idle', "DIDN'T CATCH THAT — TAP & SPEAK RIGHT AWAY");
        } else if (event.error === 'not-allowed') {
          setOrbState('idle', 'MIC BLOCKED — CHECK SITE PERMISSIONS');
        } else {
          setOrbState('idle', 'MIC ERROR: ' + event.error.toUpperCase());
        }
      };

      recognition.onend = function() {
        if (state === 'listening') {
          setOrbState('idle', 'TAP THE ORB TO SPEAK');
        }
      };

      return true;
    }

    function startListening() {
      if (!recognition) {
        if (!initVoice()) return;
      }
      setOrbState('listening', 'LISTENING... SPEAK NOW');
      try { recognition.start(); } catch(e) {}
    }

    function speakReply(text) {
      try {
        stopSpeaking();

        const cleanText = text
          .replace(/\*\*/g,'').replace(/\*/g,'')
          .replace(/#{1,6}/g,'').replace(/`/g,'')
          .replace(/\[([^\]]+)\]\([^\)]+\)/g,'$1')
          .replace(/\n+/g,' ')
          .trim();

        setOrbState('speaking', 'SCORPION SPEAKING... TAP TO INTERRUPT');

        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'en-US';
        utterance.pitch = 0.85;
        utterance.rate = 1.15;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v =>
          v.name.includes('Google US English') ||
          v.name.includes('Daniel') ||
          v.name.includes('Alex')
        );
        if (preferred) utterance.voice = preferred;

        utterance.onend = () => {
          if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
          if (state === 'speaking') setOrbState('idle', 'TAP THE ORB TO SPEAK');
        };
        utterance.onerror = () => {
          if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
          if (state === 'speaking') setOrbState('idle', 'TAP THE ORB TO SPEAK');
        };

        // fix Chrome freezing on long speech
        resumeTimer = setInterval(() => {
          if (!window.speechSynthesis.speaking) {
            clearInterval(resumeTimer);
            resumeTimer = null;
          } else {
            window.speechSynthesis.resume();
          }
        }, 8000);

        window.speechSynthesis.speak(utterance);

      } catch(e) {
        setOrbState('idle', 'TAP THE ORB TO SPEAK');
      }
    }

    async function sendCmd() {
      unlockAudio();
      const val = document.getElementById('cmd').value.trim();
      if (!val) return;
      document.getElementById('cmd').value = '';
      setOrbState('thinking', 'THINKING...');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: val })
        });

        if (state !== 'thinking') return;

        const data = await response.json();

        if (data.error) {
          setOrbState('idle', 'ERROR — TAP ORB TO RETRY');
          document.getElementById('output').innerText = '❌ ' + data.error;
          return;
        }

        document.getElementById('output').innerText = '🦂 ' + data.reply;
        speakReply(data.reply);

      } catch(e) {
        setOrbState('idle', 'ERROR — TAP ORB TO RETRY');
        document.getElementById('output').innerText = '❌ ERROR: ' + e.message;
      }
    }

    document.getElementById('cmd').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendCmd();
    });
  </script>

</body>
</html>
