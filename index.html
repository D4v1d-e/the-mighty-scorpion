<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Mighty Scorpion AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">
    <div id="header">
      <div id="logo">🦂 THE MIGHTY SCORPION</div>
      <div id="status"><span id="dot"></span> JARVIS ONLINE</div>
    </div>

    <div id="orb-area">
      <div id="orb">🦂</div>
      <div id="orb-label">SCORPION CORE</div>
      <div id="orb-status">AWAITING YOUR COMMAND...</div>
    </div>

    <div id="input-area">
      <input id="cmd" type="text" placeholder="ask me anything..." />
      <button onclick="sendCmd()">SEND</button>
      <button id="micBtn" onclick="VoiceInput.toggle()">🎙️ SPEAK</button>
      <button onclick="VoiceOutput.stop()">🔇 STOP</button>
    </div>

    <div id="output">SCORPION AI READY.</div>
  </div>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#00ff88; font-family:'Share Tech Mono',monospace; min-height:100vh; }
    #header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; border-bottom:1px solid #00ff4420; }
    #logo { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; letter-spacing:3px; }
    #status { font-size:11px; color:#00ff8877; display:flex; align-items:center; gap:6px; }
    #dot { width:8px; height:8px; border-radius:50%; background:#00ff88; display:inline-block; animation:pulse 1.5s infinite; }
    #orb-area { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; }
    #orb { font-size:80px; cursor:pointer; animation:float 3s ease-in-out infinite; }
    #orb-label { font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:4px; color:#00ff8866; margin-top:16px; }
    #orb-status { font-size:11px; color:#00ff8844; margin-top:8px; }
    #input-area { display:flex; gap:8px; padding:0 24px; max-width:700px; margin:0 auto; flex-wrap:wrap; }
    #cmd { flex:1; background:#00ff880a; border:1px solid #00ff4430; border-radius:6px; padding:12px 16px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:13px; outline:none; }
    #cmd::placeholder { color:#00ff8844; }
    button { background:#00ff4420; border:1px solid #00ff4440; border-radius:6px; padding:12px 20px; color:#00ff88; font-family:'Share Tech Mono',monospace; font-size:12px; cursor:pointer; }
    button:hover { background:#00ff4435; }
    #output { max-width:700px; margin:20px auto; padding:16px 24px; font-size:12px; color:#00ff8888; line-height:1.8; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  </style>

  <script src="https://js.puter.com/v2/"></script>
  <script src="voice.js"></script>
  <script src="voice-output.js"></script>
  <script src="ai.js"></script>

  <script>
    function sendCmd() {
      const val = document.getElementById('cmd').value.trim();
      if (!val) return;
      document.getElementById('cmd').value = '';
      AI.think(val);
    }

    document.getElementById('cmd').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendCmd();
    });

    window.speechSynthesis.onvoiceschanged = function() {
      console.log('Voices loaded');
    };
  </script>

</body>
</html>
